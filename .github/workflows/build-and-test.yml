name: Build and Test

on:
  push

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install -e .
      - run: ruff check .
      - run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=0