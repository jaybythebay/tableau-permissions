version: 2

updates:
  # Update the GitHub actions used in our CI/CD workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"

  # Update the Python packages for the image
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"